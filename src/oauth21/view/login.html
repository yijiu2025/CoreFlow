<!-- frontend/login.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Encrypted</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a; --surface: #141414; --border: #2a2a2a;
      --accent: #c8ff00; --text: #e8e8e8; --muted: #666;
      --danger: #ff4444; --success: #00ff88;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Mono', monospace; background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .container { width: 100%; max-width: 480px; padding: 0 24px; }
    .brand {
      font-family: 'Instrument Serif', serif; font-size: 14px;
      letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent);
      margin-bottom: 48px;
    }
    h1 {
      font-family: 'Instrument Serif', serif; font-size: 32px;
      font-weight: 400; margin-bottom: 8px;
    }
    .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 32px; }
    .form-group { margin-bottom: 20px; }
    label {
      display: block; font-size: 11px; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
    }
    input {
      width: 100%; padding: 12px 16px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 4px;
      color: var(--text); font-family: 'DM Mono', monospace;
      font-size: 14px; outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }
    button {
      width: 100%; padding: 14px; background: var(--accent); color: #000;
      border: none; border-radius: 4px; font-family: 'DM Mono', monospace;
      font-size: 13px; font-weight: 500; letter-spacing: 0.1em;
      cursor: pointer; transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .msg {
      margin-top: 16px; padding: 12px; border-radius: 4px;
      font-size: 12px; display: none; word-break: break-all;
    }
    .msg-error {
      background: rgba(255,68,68,0.1); border: 1px solid rgba(255,68,68,0.3);
      color: var(--danger);
    }
    .msg-success {
      background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.3);
      color: var(--success);
    }
    .msg-info {
      background: rgba(200,255,0,0.05); border: 1px solid rgba(200,255,0,0.2);
      color: var(--muted);
    }
    .security-badge {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 24px; font-size: 11px; color: var(--accent);
      letter-spacing: 0.1em;
    }
    .security-badge::before {
      content: '●'; font-size: 8px;
    }
    .token-display {
      margin-top: 24px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 16px; font-size: 11px; max-height: 300px;
      overflow-y: auto; white-space: pre-wrap; display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">OAuth 2.1 Authorization Center</div>
    <div class="security-badge">RSA-OAEP Encrypted Login</div>
    <h1>Sign in</h1>
    <p class="subtitle">Your password is encrypted before transmission</p>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" required autofocus autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="current-password">
      </div>
      <button type="submit" id="submitBtn">Sign in securely</button>
    </form>

    <div id="msg" class="msg"></div>
    <div id="tokenDisplay" class="token-display"></div>
  </div>

  <script type="module">
    // ─── 配置 ───
    const SERVER = 'http://localhost:3000';

    // ─── 缓存公钥 ───
    let cachedPublicKey = null;
    let cachedKeyId = null;

    /**
     * 获取服务器 RSA 公钥
     */
    async function fetchPublicKey() {
      if (cachedPublicKey) return cachedPublicKey;

      const resp = await fetch(`${SERVER}/crypto/public-key`);
      if (!resp.ok) throw new Error('Failed to fetch public key');

      const data = await resp.json();
      cachedKeyId = data.kid;

      // 将 JWK 导入为 Web Crypto API 的 CryptoKey
      cachedPublicKey = await crypto.subtle.importKey(
        'jwk',
        data.key,
        { name: 'RSA-OAEP', hash: 'SHA-256' },
        false,           // 不可导出
        ['encrypt'],     // 只允许加密
      );

      console.log('[Crypto] Public key imported, kid:', data.kid);
      return cachedPublicKey;
    }

    /**
     * 用 RSA-OAEP 加密数据
     * @param {string} plaintext - 明文
     * @returns {Promise<string>} Base64 编码的密文
     */
    async function rsaEncrypt(plaintext) {
      const publicKey = await fetchPublicKey();

      const encoded = new TextEncoder().encode(plaintext);
      const encrypted = await crypto.subtle.encrypt(
        { name: 'RSA-OAEP' },
        publicKey,
        encoded,
      );

      // 转为 Base64 字符串
      return arrayBufferToBase64(encrypted);
    }

    /**
     * ArrayBuffer → Base64
     */
    function arrayBufferToBase64(buffer) {
      const bytes = new Uint8Array(buffer);
      let binary = '';
      for (const b of bytes) binary += String.fromCharCode(b);
      return btoa(binary);
    }

    /**
     * 生成随机 nonce
     */
    function generateNonce() {
      const bytes = crypto.getRandomValues(new Uint8Array(16));
      return Array.from(bytes, b => b.toString(16).padStart(2, '0')).join('');
    }

    // ─── 表单处理 ───
    const form = document.getElementById('loginForm');
    const msgEl = document.getElementById('msg');
    const tokenEl = document.getElementById('tokenDisplay');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msgEl.style.display = 'none';
      tokenEl.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Encrypting...';

      try {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        if (!username || !password) {
          throw new Error('Please fill in all fields');
        }

        // ─── 第1步：构造要加密的载荷 ───
        const payload = JSON.stringify({ username, password });
        console.log('[Login] Payload constructed, length:', payload.length);

        // ─── 第2步：RSA-OAEP 加密 ───
        submitBtn.textContent = 'Encrypting with RSA...';
        const encrypted = await rsaEncrypt(payload);
        console.log('[Login] Encrypted, base64 length:', encrypted.length);

        // ─── 第3步：构造请求 ───
        const nonce = generateNonce();
        const timestamp = Date.now();

        const requestBody = {
          encrypted,
          timestamp,
          nonce,
          scope: 'openid profile email',
        };

        console.log('[Login] Sending encrypted login request...');

        // ─── 第4步：发送 ───
        submitBtn.textContent = 'Authenticating...';
        const resp = await fetch(`${SERVER}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(requestBody),
        });

        const data = await resp.json();

        if (!resp.ok) {
          throw new Error(data.error_description || data.error || 'Login failed');
        }

        // ─── 第5步：成功 ───
        showMsg('Login successful', 'success');
        showTokens(data);

        // 解析 id_token 中的用户信息
        if (data.id_token) {
          const claims = parseJwt(data.id_token);
          console.log('[Login] Welcome,', claims.name || claims.email || claims.sub);
        }

      } catch (err) {
        showMsg(err.message, 'error');
        console.error('[Login] Error:', err);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign in securely';
      }
    });

    function showMsg(text, type) {
      msgEl.textContent = text;
      msgEl.className = `msg msg-${type}`;
      msgEl.style.display = 'block';
    }

    function showTokens(data) {
      const lines = [
        '╔══════════════════════════════════════════════╗',
        '║             TOKENS RECEIVED                  ║',
        '╚══════════════════════════════════════════════╝',
        '',
        `token_type:  ${data.token_type}`,
        `expires_in:  ${data.expires_in}s`,
        `scope:       ${data.scope}`,
        '',
        '── access_token ──',
        truncate(data.access_token, 60),
        '',
      ];

      if (data.id_token) {
        const claims = parseJwt(data.id_token);
        lines.push('── id_token (decoded) ──');
        lines.push(JSON.stringify(claims, null, 2));
        lines.push('');
        lines.push('── id_token (raw) ──');
        lines.push(truncate(data.id_token, 60));
        lines.push('');
      }

      lines.push('── refresh_token ──');
      lines.push(truncate(data.refresh_token, 60));

      tokenEl.textContent = lines.join('\n');
      tokenEl.style.display = 'block';
    }

    function parseJwt(token) {
      const payload = token.split('.')[1];
      return JSON.parse(atob(payload));
    }

    function truncate(str, len) {
      if (!str) return '';
      return str.length > len ? str.slice(0, len) + '...' : str;
    }
  </script>
</body>
</html>
