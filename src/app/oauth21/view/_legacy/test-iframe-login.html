<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>测试 SSO 登录 iframe 嵌套</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #f0f2f5; /* 模拟父应用的背景色 */
        font-family: sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .header {
        background: #fff;
        height: 64px;
        display: flex;
        align-items: center;
        padding: 0 24px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      }

      /* === 核心：模拟你提供的 iframe 包裹层样式 === */
      .login-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.4);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }

      .login-iframe-wrap--gc03OP5a {
        /* 可以在这里加一些动画 */
      }

      .iframe-loaded {
        display: flex;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h3>我的主应用 (父页面)</h3>
      <button
        onclick="document.getElementById('login-modal').style.display = 'flex'"
        style="margin-left: auto; padding: 8px 16px"
      >
        唤起登录
      </button>
    </div>

    <div style="padding: 40px">
      <p>这里是主应用的其他内容...</p>
      <p>点击上方按钮唤起你刚刚创建的 iframe 登录页。</p>
    </div>

    <!-- 这里是你提供的那种完整的 iframe 嵌套方式 -->
    <div id="login-modal" class="login-overlay" style="display: none">
      <div class="login-iframe-wrap--gc03OP5a">
        <div id="xy-login-iframe" class="iframe-loaded">
          <!-- 
          src 指向刚才创建的 Vue 独立项目启动的本地地址 (http://localhost:5173)。
          如果是打包后放入后端的，就指向如 https://your-backend.com/login/index.html 
        -->
          <iframe
            id="alibaba-login-box"
            src="http://localhost:5173"
            width="856"
            height="454"
            frameborder="none"
            scrolling="no"
            style="
              border-width: medium;
              border-style: none;
              border-color: currentcolor;
              border-image: initial;
              background: transparent;
            "
          >
          </iframe>
        </div>
      </div>
    </div>

    <script>
      // 监听来自 iframe 的消息 (SSO Token 或者关闭指令)
      window.addEventListener('message', function (event) {
        // 安全起见，实际应用中应当验证 event.origin
        // if (event.origin !== 'http://localhost:5173') return;

        const data = event.data;
        if (data && data.type === 'SSO_SUCCESS') {
          console.log('父应用收到 SSO 登录成功消息，Token为:', data.token);
          alert(
            '主应用接收到了 Token:\n' +
              data.token.substring(0, 20) +
              '...\n\n马上刷新页面或进入系统！'
          );
          document.getElementById('login-modal').style.display = 'none';

          // 此处可以将 token 存入 localStorage 或者发送给自己的后端进行验证登录状态
          // localStorage.setItem('token', data.token);
        } else if (data && data.type === 'SSO_CLOSE') {
          console.log('父应用收到关闭指令');
          document.getElementById('login-modal').style.display = 'none';
        }
      });
    </script>
  </body>
</html>
